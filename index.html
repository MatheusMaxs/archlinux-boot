<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDP — Servidor dos Programadores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #c0c0c0;
      font-family: 'Dogica Pixel', 'Dogica', 'Consolas', 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* ── Boot Screen ── */
    #boot-screen {
      position: fixed; inset: 0;
      font-size: 14px;
      line-height: 1.5;
      padding: 20px 30px;
      overflow: hidden;
      z-index: 9999;
      display: flex;
      flex-direction: column;
    }
    #boot-screen.shutdown {
      animation: crt-off 0.6s ease-in forwards;
      pointer-events: none;
    }
    @keyframes crt-off {
      0%   { transform: scaleY(1); opacity: 1; filter: brightness(1); }
      15%  { transform: scaleY(1.01); filter: brightness(1.5); }
      30%  { transform: scaleY(0.005); filter: brightness(3); }
      60%  { transform: scaleY(0.001); opacity: 1; filter: brightness(5); }
      100% { transform: scaleY(0); opacity: 0; filter: brightness(0); }
    }

    #flash-overlay {
      position: fixed; inset: 0;
      z-index: 10001;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
    }
    #flash-overlay.active {
      opacity: 1;
    }

    @keyframes crt-on {
      0%   { transform: scaleY(0.005); opacity: 0; filter: brightness(0); }
      20%  { transform: scaleY(0.01); opacity: 0; filter: brightness(3); }
      50%  { transform: scaleY(1.02); opacity: 1; filter: brightness(1.8); }
      75%  { transform: scaleY(0.98); filter: brightness(1.1); }
      100% { transform: scaleY(1); opacity: 1; filter: brightness(1); }
    }
    #boot-log {
      flex: 1;
      overflow: hidden;
      scrollbar-width: none;
    }
    #boot-log::-webkit-scrollbar { display: none; }
    .line { white-space: nowrap; overflow: hidden; }
    .line .timestamp { color: #c0c0c0; }
    .line .ok, .line .fail, .line .warn, .line .info, .line .highlight { color: #c0c0c0; }
    .cursor {
      display: inline-block;
      width: 8px; height: 16px;
      background: #c0c0c0;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 4px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #boot-status {
      border-top: 1px solid #333;
      padding-top: 10px; margin-top: 10px;
      display: flex;
      gap: 24px;
      font-size: 13px;
    }
    #boot-status .label { color: #666; }
    #boot-status .value { color: #c0c0c0; }
    #boot-status .value.ok { color: #c0c0c0; }

    /* ── CRT Overlay ── */
    #crt-overlay {
      pointer-events: none;
      position: fixed; inset: 0;
      z-index: 10000;
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.8),
        inset 0 0 120px rgba(0,0,0,0.4);
    }
    #crt-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
      animation: scanline-move 8s linear infinite;
    }
    #crt-overlay::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    }
    @keyframes scanline-move {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }
    @keyframes flicker {
      0%   { opacity: 1; }
      50%  { opacity: 0.97; }
      70%  { opacity: 0.98; }
      100% { opacity: 1; }
    }
    #boot-screen, #app {
      animation: flicker 0.15s infinite;
    }

    /* ── App Layout ── */
    #app {
      display: none;
      grid-template-columns: 200px 1fr;
      grid-template-rows: 1fr auto;
      height: 100vh;
      scrollbar-width: none;
    }
    #app::-webkit-scrollbar { display: none; }
    #app.power-on {
      animation: crt-on 0.6s ease-out forwards;
    }

    /* ── Sidebar ── */
    #sidebar {
      grid-row: 1 / 3;
      grid-column: 1;
      z-index: 9997;
      padding: 24px 0;
      border-right: 1px solid #1a1a1a;
      background: #0c0c0c;
      display: flex;
      flex-direction: column;
    }
    #sidebar .side-header {
      color: #444;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding: 0 16px;
    }
    .side-items {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .side-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .side-item:hover {
      color: #999;
      background: rgba(255,255,255,0.03);
    }
    .side-item.active {
      color: #c0c0c0;
      border-left-color: #c0c0c0;
      background: rgba(255,255,255,0.05);
    }
    .side-item .side-num {
      color: #333;
      font-size: 9px;
      width: 16px;
      text-align: right;
    }
    .side-item.active .side-num {
      color: #666;
    }
    .side-item .side-label {
      flex: 1;
    }
    .side-item .side-arrow {
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .side-item.active .side-arrow {
      opacity: 1;
    }
    .side-footer {
      padding: 0 0 0 16px;
      color: #333;
      font-size: 9px;
      margin-top: auto;
    }

    body.light #sidebar {
      background: #e8e6e3;
      border-right-color: #ccc;
    }
    body.light .side-item { color: #999; }
    body.light .side-item:hover { color: #555; background: rgba(0,0,0,0.03); }
    body.light .side-item.active { color: #222; border-left-color: #222; background: rgba(0,0,0,0.05); }
    body.light .side-item .side-num { color: #ccc; }
    body.light .side-item.active .side-num { color: #888; }
    body.light #sidebar .side-header { color: #bbb; }
    body.light .side-footer { color: #bbb; border-top-color: #ccc; }
    body.light #app { background: #e8e6e3; }

    /* ── Main Content (Sections) ── */
    #main-content {
      grid-row: 1;
      grid-column: 2;
      position: relative;
      overflow: hidden;
      scrollbar-width: none;
    }
    #main-content::-webkit-scrollbar { display: none; }

    .section {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: scale(0.97);
      pointer-events: none;
      overflow: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    .section.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .section.exit-left {
      opacity: 0;
      transform: translateX(-40px) scale(0.97);
    }
    .section.exit-right {
      opacity: 0;
      transform: translateX(40px) scale(0.97);
    }

    .section .terminal {
      text-align: left;
      font-size: 11px;
      line-height: 1.5;
      color: #c0c0c0;
      white-space: pre;
      max-width: 700px;
      width: 100%;
    }

    .section .prompt {
      color: #4ade80;
    }

    .section .comment {
      color: #666;
    }

    .section .value {
      color: #e0e0e0;
    }

    .section .dim {
      color: #777;
    }

    .section .cmd {
      color: #888;
    }

    .section .highlight {
      color: #f0f0f0;
      font-weight: bold;
    }

    .section .accent {
      color: #4ade80;
    }

    .section .link {
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .section .link:hover {
      opacity: 0.7;
    }

    /* ── Navigation Footer ── */
    #nav-footer {
      grid-row: 2;
      grid-column: 1 / 3;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #555;
      border-top: 1px solid #1a1a1a;
      background: #0c0c0c;
    }

    #nav-left {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #nav-right {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .key-group {
      display: flex;
      gap: 2px;
      align-items: center;
      color: #666;
      font-size: 11px;
    }
    .key {
      color: #999;
    }
    .key-desc {
      color: #555;
    }

    /* ── Light Mode ── */
    body.light {
      background: #e8e6e3;
      color: #333;
      scrollbar-width: none;
    }
    body.light::-webkit-scrollbar { display: none; }
    body.light #app { background: #e8e6e3; scrollbar-width: none; }
    body.light #app::-webkit-scrollbar { display: none; }
    body.light #boot-screen { background: #e8e6e3; color: #333; }
    body.light #boot-screen .line .timestamp,
    body.light #boot-screen .line .ok,
    body.light #boot-screen .line .fail,
    body.light #boot-screen .line .warn,
    body.light #boot-screen .line .info,
    body.light #boot-screen .line .highlight { color: #333; }
    body.light #boot-status { border-top-color: #ccc; }
    body.light #boot-status .label { color: #999; }
    body.light #boot-status .value { color: #333; }
    body.light .cursor { background: #333; }
    body.light #nav-footer {
      background: #e8e6e3;
      border-top-color: #ccc;
      color: #999;
    }
    body.light .key {
      border-color: #ccc;
      background: #f0eeeb;
      color: #666;
    }
    body.light .section .terminal { color: #444; }
    body.light .section .prompt { color: #2a7a4a; }
    body.light .section .comment { color: #999; }
    body.light .section .value { color: #222; }
    body.light .section .dim { color: #aaa; }
    body.light .section .cmd { color: #888; }
    body.light .section .highlight { color: #111; }
    body.light .section .accent { color: #2a7a4a; }
    body.light .section .link:hover { opacity: 0.6; }
    body.light #crt-overlay { border-color: #e8e6e3; }

    /* ── Mobile Navigation ── */
    #mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9998;
      background: #0c0c0c;
      border-top: 1px solid #1a1a1a;
      padding: 10px 16px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .mobile-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .mobile-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mobile-dot.active {
      background: #4ade80;
      transform: scale(1.3);
    }

    .mobile-controls {
      display: flex;
      gap: 16px;
    }

    .mobile-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .mobile-btn:hover {
      border-color: #4ade80;
      color: #4ade80;
    }

    body.light #mobile-nav {
      background: #e8e6e3;
      border-top-color: #ccc;
    }

    body.light .mobile-dot {
      background: #ccc;
    }

    body.light .mobile-dot.active {
      background: #2a7a4a;
    }

    body.light .mobile-btn {
      border-color: #ccc;
      color: #888;
    }

    body.light .mobile-btn:hover {
      border-color: #2a7a4a;
      color: #2a7a4a;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }

      #sidebar {
        display: none !important;
      }

      #main-content {
        grid-column: 1;
      }

      #nav-footer {
        display: none !important;
      }

      #mobile-nav {
        display: flex;
      }

      .section {
        padding: 20px 16px;
        padding-bottom: 80px;
      }

      .section .terminal {
        font-size: 9px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #boot-screen {
        font-size: 10px;
        padding: 10px 15px;
      }

      .line {
        white-space: pre-wrap;
        word-break: break-word;
      }

      #boot-status {
        font-size: 10px;
        gap: 12px;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 480px) {
      .section .terminal {
        font-size: 8px;
        line-height: 1.3;
      }

      .section {
        padding: 16px 12px;
        padding-bottom: 80px;
      }

      #boot-screen {
        font-size: 8px;
        padding: 8px 10px;
      }

      .section .highlight {
        font-size: 10px;
      }

      .section .accent {
        font-size: 9px;
      }
    }

    @media (max-height: 600px) {
      .section .terminal {
        font-size: 8px;
        line-height: 1.3;
      }

      .section {
        padding: 12px 10px;
        padding-bottom: 80px;
      }
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <div id="boot-log"></div>
    <div id="boot-status">
      <div><span class="label">services:</span> <span class="value" id="svc-count">0</span></div>
      <div><span class="label">status:</span> <span class="value" id="boot-state">starting...</span></div>
    </div>
  </div>

  <div id="app">
    <div id="sidebar" style="display:none;">
      <div class="side-header">sdp://</div>
      <div class="side-items"></div>
      <div class="side-footer">21.482 devs online</div>
    </div>

    <div id="main-content"></div>

    <div id="nav-footer" style="display:none;">
      <div id="nav-left">
        <span class="key-group">
          <span class="key">⑂</span>
          <span class="key-desc">main · sync ok</span>
        </span>
      </div>
      <div id="nav-right">
        <span class="key-group">
          <span class="key">[↑/↓]</span>
          <span class="key-desc">Navigate</span>
        </span>
        <span class="key-group">
          <span class="key">[1-6]</span>
          <span class="key-desc">Section</span>
        </span>
        <span class="key-group">
          <span class="key">[M]</span>
          <span class="key-desc">Theme</span>
        </span>
        <span class="key-group">
          <span class="key">[R]</span>
          <span class="key-desc">Reset</span>
        </span>
      </div>
    </div>
  </div>

  <div id="mobile-nav">
    <div class="mobile-dots"></div>
    <div class="mobile-controls">
      <button id="mobile-prev" class="mobile-btn">◀</button>
      <button id="mobile-theme" class="mobile-btn">◐</button>
      <button id="mobile-next" class="mobile-btn">▶</button>
    </div>
  </div>

  <div id="flash-overlay"></div>
  <div id="crt-overlay"></div>

  <script>
    // ── Boot sequence ──
    const log = document.getElementById('boot-log');
    const svcCount = document.getElementById('svc-count');
    const bootState = document.getElementById('boot-state');
    const bootScreen = document.getElementById('boot-screen');
    const mainContent = document.getElementById('main-content');
    const navFooter = document.getElementById('nav-footer');
    const sidebar = document.getElementById('sidebar');

    let lineIndex = 0;

    const lines = [
      { type: 'raw', text: '                    sdp:// workspace', style: 'highlight' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'explorer', style: 'info' },
      { type: 'raw', text: '▾ sdp://', style: 'info' },
      { type: 'raw', text: '⌁', style: 'info' },
      { type: 'raw', text: 'home.tsx', style: 'info' },
      { type: 'raw', text: '▤', style: 'info' },
      { type: 'raw', text: 'sobre.md', style: 'info' },
      { type: 'raw', text: '{}', style: 'info' },
      { type: 'raw', text: 'eventos.json', style: 'info' },
      { type: 'raw', text: '◈', style: 'info' },
      { type: 'raw', text: 'quests.lua', style: 'info' },
      { type: 'raw', text: '▲', style: 'info' },
      { type: 'raw', text: 'founders.ts', style: 'info' },
      { type: 'raw', text: '$', style: 'info' },
      { type: 'raw', text: 'contato.sh', style: 'info' },
      { type: 'raw', text: '' },
      { type: 'raw', text: '● 2.700 online', style: 'ok' },
      { type: 'raw', text: '⑂ main · sync ok', style: 'ok' },
      { type: 'raw', text: '' },
      { type: 'delay', ms: 600 },
      { type: 'raw', text: 'loading workspace...', style: 'info' },
      { type: 'delay', ms: 400 },
      { type: 'raw', text: 'booting sdp://environment', style: 'info' },
      { type: 'delay', ms: 500 },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'ctrl+k para buscar · ↑↑↓↓←→←→BA', style: 'dim' },
      { type: 'delay', ms: 800 },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'import { comunidade } from \'@sdp/discord\';', style: 'info' },
      { type: 'raw', text: '// networking, dicas, eventos e + de TI — para todos os públicos', style: 'comment' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'Servidor dos programadores', style: 'highlight' },
      { type: 'raw', text: '' },
      { type: 'raw', text: '$ join --server sdp ', style: 'ok' },
      { type: 'raw', text: '▶ entrar no servidor', style: 'accent' },
      { type: 'raw', text: '' },
      { type: 'raw', text: './eventos --proximos', style: 'info' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'parceiros', style: 'dim' },
      { type: 'raw', text: '  ◆ websecbr.org', style: 'info' },
      { type: 'raw', text: '  ◆ aceleradev.com.br', style: 'info' },
      { type: 'raw', text: '  ◆ hostinger.com', style: 'info' },
      { type: 'raw', text: '  ◆ seja você também', style: 'comment' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'sobre.md — a história da comunidade', style: 'highlight' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'Criada por devs, para devs', style: 'accent' },
      { type: 'raw', text: 'Desde 2023, reunimos programadores de todos os níveis', style: 'info' },
      { type: 'raw', text: 'para aprender, colaborar e fazer networking de verdade.', style: 'info' },
      { type: 'raw', text: '' },
      { type: 'raw', text: '  21.482+ membros', style: 'highlight' },
      { type: 'raw', text: '  08+ eventos / mês', style: 'highlight' },
      { type: 'raw', text: '  24/7 canais ativos', style: 'highlight' },
      { type: 'raw', text: '  100% gratuito, sempre', style: 'highlight' },
      { type: 'raw', text: '' },
      { type: 'raw', text: 'archlinux login: ', blink: true },
    ];

    function pad(n) { return String(n).padStart(2, '0'); }
    function timestamp() {
      const d = new Date();
      return `[${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}]`;
    }
    function createLine(text, className) {
      const div = document.createElement('div');
      div.className = 'line';
      if (className) {
        const span = document.createElement('span');
        span.className = className;
        span.textContent = text;
        div.appendChild(span);
      } else {
        div.textContent = text;
      }
      return div;
    }
    function createSystemdLine(text, isOk) {
      const div = document.createElement('div');
      div.className = 'line';
      const ts = document.createElement('span');
      ts.className = 'timestamp';
      ts.textContent = timestamp() + ' ';
      div.appendChild(ts);
      const status = document.createElement('span');
      status.className = isOk ? 'ok' : 'fail';
      status.textContent = isOk ? '[  OK  ]' : '[FAILED]';
      div.appendChild(status);
      const msg = document.createTextNode(' ' + text);
      div.appendChild(msg);
      return div;
    }
    function createBootLine(text, isOk) {
      const div = document.createElement('div');
      div.className = 'line';
      const status = document.createElement('span');
      status.className = isOk ? 'ok' : 'fail';
      status.textContent = isOk ? '[  OK  ]' : '[FAILED]';
      div.appendChild(status);
      const msg = document.createTextNode(' ' + text);
      div.appendChild(msg);
      return div;
    }

    let svcCounter = 0;
    let bootDone = false;



    function appendLine(type, data) {
      let el;
      if (type === 'systemd') {
        el = createSystemdLine(data.msg, data.ok);
        svcCounter++;
        svcCount.textContent = svcCounter;
      } else if (type === 'boot') {
        el = createBootLine(data.msg, data.ok);
      } else if (type === 'raw') {
        el = createLine(data.text, data.style);
      }
      if (el) log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    function flash() {
      const el = document.getElementById('flash-overlay');
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 80);
    }

    function bootComplete() {
      if (bootDone) return;
      bootDone = true;
      bootState.textContent = 'ready';

      const app = document.getElementById('app');

      setTimeout(() => {
        flash();

        bootScreen.classList.add('shutdown');

        setTimeout(() => {
          bootScreen.style.display = 'none';
          bootScreen.classList.remove('shutdown');

          app.style.display = 'grid';

          setTimeout(() => flash(), 40);

          setTimeout(() => {
            initSections();
            app.classList.add('power-on');

            }, 650);
          }, 100);
        }, 700);
      }, 1200);
    }

    function processNext() {
      if (lineIndex >= lines.length) { bootComplete(); return; }
      const data = lines[lineIndex];
      lineIndex++;
      if (data.type === 'delay') { setTimeout(processNext, data.ms); return; }
      const delay = data.extraDelay || (data.type === 'systemd' ? 60 + Math.random() * 80 : 40 + Math.random() * 60);
      if (data.blink) {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = data.text;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        div.appendChild(cursor);
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      } else {
        appendLine(data.type, data);
      }
      setTimeout(processNext, delay);
    }

    let currentSection = 0;
    let isTransitioning = false;

    function initSections() {
      sections.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'section';
        div.id = 'section-' + s.id;
        div.innerHTML = s.html;
        mainContent.appendChild(div);
      });

      // Build sidebar
      const sideLabels = ['home.tsx', 'sobre.md', 'eventos.json', 'quests.lua', 'founders.ts', 'contato.sh'];
      const sideIcons = ['⌁', '▤', '{}', '◈', '▲', '$'];
      const sideItems = sidebar.querySelector('.side-items');
      sections.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'side-item';
        item.dataset.index = i;
        item.innerHTML = `
          <span class="side-num">${sideIcons[i]}</span>
          <span class="side-label">${sideLabels[i]}</span>
          <span class="side-arrow">&gt;</span>
        `;
        item.addEventListener('click', () => {
          if (isTransitioning || i === currentSection) return;
          goToSection(i, i > currentSection ? 'right' : 'left');
        });
        sideItems.appendChild(item);
      });

      // Build mobile dots
      const mobileDots = document.querySelector('.mobile-dots');
      sections.forEach((s, i) => {
        const dot = document.createElement('div');
        dot.className = 'mobile-dot';
        dot.dataset.index = i;
        dot.addEventListener('click', () => {
          if (isTransitioning || i === currentSection) return;
          goToSection(i, i > currentSection ? 'right' : 'left');
        });
        mobileDots.appendChild(dot);
      });

      // Mobile controls
      document.getElementById('mobile-prev').addEventListener('click', () => {
        if (isTransitioning || currentSection > 0) {
          goToSection(currentSection - 1, 'left');
        }
      });

      document.getElementById('mobile-next').addEventListener('click', () => {
        if (isTransitioning || currentSection < sections.length - 1) {
          goToSection(currentSection + 1, 'right');
        }
      });

      document.getElementById('mobile-theme').addEventListener('click', () => {
        document.body.classList.toggle('light');
      });

      // Touch swipe support
      let touchStartX = 0;
      let touchStartY = 0;
      mainContent.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      mainContent.addEventListener('touchend', (e) => {
        if (isTransitioning) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchStartX - touchEndX;
        const diffY = touchStartY - touchEndY;

        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
          if (diffX > 0 && currentSection < sections.length - 1) {
            goToSection(currentSection + 1, 'right');
          } else if (diffX < 0 && currentSection > 0) {
            goToSection(currentSection - 1, 'left');
          }
        }
      }, { passive: true });

      goToSection(0, false);

      setTimeout(() => {
        sidebar.style.display = 'flex';
        navFooter.style.display = 'flex';
      }, 400);

      document.addEventListener('keydown', handleKey);
    }

    function handleKey(e) {
      const key = e.key;

      // Only handle keyboard if not in boot
      if (bootScreen.style.display !== 'none') return;

      switch (key) {
        case 'ArrowDown':
          e.preventDefault();
          if (isTransitioning) return;
          if (currentSection < sections.length - 1) {
            goToSection(currentSection + 1, 'right');
          }
          break;
        case 'ArrowUp':
          e.preventDefault();
          if (isTransitioning) return;
          if (currentSection > 0) {
            goToSection(currentSection - 1, 'left');
          }
          break;
        case '1': case '2': case '3': case '4': case '5': case '6':
          e.preventDefault();
          if (isTransitioning) return;
          const idx = parseInt(key) - 1;
          if (idx < sections.length) {
            goToSection(idx, idx > currentSection ? 'right' : 'left');
          }
          break;
        case 'r':
        case 'R':
          e.preventDefault();
          if (isTransitioning) return;
          goToSection(0, 'left');
          break;
        case 'm':
        case 'M':
          e.preventDefault();
          document.body.classList.toggle('light');
          break;
        case 'Escape':
          e.preventDefault();
          if (document.body.classList.contains('light')) {
            document.body.classList.remove('light');
          }
          break;
      }
    }

    function goToSection(index, direction) {
      isTransitioning = true;
      const prev = currentSection;
      currentSection = index;

      const prevEl = document.querySelector('.section.active');
      const nextEl = document.getElementById('section-' + sections[index].id);

      if (prevEl) {
        if (direction === 'left') {
          prevEl.classList.add('exit-right');
        } else if (direction === 'right') {
          prevEl.classList.add('exit-left');
        } else {
          prevEl.classList.remove('active');
        }
      }

      // If there's a previous element, wait for its transition
      if (prevEl && direction) {
        setTimeout(() => {
          prevEl.classList.remove('active', 'exit-left', 'exit-right');
        }, 500);
      }

      nextEl.classList.add('active');

      // Update sidebar active
      document.querySelectorAll('.side-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
      });

      // Update mobile dots
      document.querySelectorAll('.mobile-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });

      setTimeout(() => {
        isTransitioning = false;
      }, 550);
    }

    processNext();
  </script>
